<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllVerse Card - Gacha TCG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="money-rain-container"></div>

    <header id="main-stats">
        <div class="stat">💎 Gems: <span id="gems-count">0</span></div>
        <div class="stat">🔮 Cristaux: <span id="cristaux-count">0</span></div>
        <div class="stat">🔥 Puissance: <span id="total-power">0</span></div>
    </header>

    <div id="main-layout">
        <nav id="sidebar">
            <h2 style="color: #e94560; text-align: center;">ALLVERSE</h2>
            <button class="pixel-button" onclick="switchView('view-hub')">HUB</button>
            <button class="pixel-button" onclick="switchView('view-gacha')">TIRAGES</button>
            <button class="pixel-button" onclick="switchView('view-deck')">MON DECK</button>
            <button class="pixel-button" onclick="switchView('view-shop')">BOUTIQUE</button>
        </nav>

        <main id="content">
            <section id="view-hub" class="game-view">
                <h1>BIENVENUE</h1>
                <p>Augmentez votre puissance pour débloquer plus de récompenses !</p>
            </section>

            <section id="view-gacha" class="game-view">
                <div class="banner-list">
                    <div class="banner">
                        <h3>Bannière Animé</h3>
                        <button class="pixel-button" onclick="processDraw('Anime', 1)">x1 (10 💎)</button>
                        <button class="pixel-button" onclick="processDraw('Anime', 11)" style="background:#ffd700; color:black;">x11 (100 💎)</button>
                    </div>
                    <div class="banner">
                        <h3>Bannière Jeux</h3>
                        <button class="pixel-button" onclick="processDraw('Jeux', 1)">x1 (10 💎)</button>
                        <button class="pixel-button" onclick="processDraw('Jeux', 11)" style="background:#ffd700; color:black;">x11 (100 💎)</button>
                    </div>
                </div>
            </section>

            <section id="view-deck" class="game-view">
                <div id="deck-container" class="deck-grid"></div>
            </section>

            <section id="view-shop" class="game-view">
                <h2>Boutique de Seconde Chance</h2>
                <p>Bientôt disponible...</p>
            </section>
        </main>
    </div>

    <div id="gacha-popup" class="modal">
        <div class="modal-content">
            <span class="close-popup" onclick="closeGachaPopup()">&times;</span>
            <h2 id="popup-title">RÉSULTAT</h2>

            <div id="roulette-zone" class="roulette-wrapper" style="display:none;">
                <div id="roulette-line"></div>
                <div id="roulette-track"></div>
            </div>

            <div id="chest-zone" style="display:none;">
                <div id="chest-container">
                    <img id="chest-sprite" src="img/close_chest_T1.png" onclick="handleChestClick()">
                </div>
                <p id="chest-instructions">Cliquez sur le coffre !</p>
            </div>

            <div id="single-result-info"></div>
            <div id="popup-results-container"></div>
            
            <button id="btn-popup-close" class="pixel-button" onclick="closeGachaPopup()" style="display:none;">SUPER !</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
